<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free AI Audit — Step 3 | Marketus.ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav><div class="container-wide"><a href="../index.html"><img src="icon-mark.png" alt="Marketus.ai" class="nav-logo nav-logo--icon" /></a><div class="nav-right"><a href="../index.html#how" class="nav-link">How it works</a><a href="./" class="nav-cta">Free AI audit</a></div></div></nav>
    <div class="nav-spacer"></div>
    <section class="book-section audit-page"><div class="container reveal visible"><div class="book-intro audit-intro"><div class="section-label">Get started</div><h2>Get your free AI audit</h2><p>Based on what you’ve shared, here’s our first read.</p></div>
      <form class="book-form multi-step-form" id="audit-step-3">
        <div class="form-progress"><div class="progress-step is-complete" data-step="1"><span class="progress-index">01</span><span class="progress-text">The basics</span></div><div class="progress-line"></div><div class="progress-step is-complete" data-step="2"><span class="progress-index">02</span><span class="progress-text">More context</span></div><div class="progress-line"></div><div class="progress-step is-active" data-step="3"><span class="progress-index">03</span><span class="progress-text">Sense check</span></div></div>
        <div class="form-panel is-active">
          <div class="form-panel-intro"><h3>Step 3 — Is this a fair summary?</h3><p>Close enough is fine — you can add more context underneath.</p></div>

          <div class="summary-card"><div class="summary-content"><p id="summary-text"></p></div></div>

          <div class="form-group"><label class="form-label">Is that about right?</label><div class="radio-group radio-group--inline"><label class="radio-option radio-option--compact"><input type="radio" name="summary_fit" value="Yes, that feels right" required /><span class="radio-custom"></span><span class="radio-label">Yes, that feels right</span></label><label class="radio-option radio-option--compact"><input type="radio" name="summary_fit" value="Not quite" required /><span class="radio-custom"></span><span class="radio-label">Not quite</span></label></div></div>
          <div class="form-group"><label class="form-label" for="summary-notes">Add anything we’ve missed<span class="form-label-sub">Optional — useful if the summary is close, but not quite there.</span></label><textarea id="summary-notes" name="summary_notes" class="form-textarea" placeholder="Anything we should add, sharpen or correct?"></textarea></div>
          <div class="form-actions form-actions--split"><a class="form-secondary form-secondary--link" href="step-2.html">Back</a><button type="submit" class="form-submit form-submit--inline">Request your audit</button></div>
          <p class="form-note">We’ll be in touch within 24 hours.</p>
        </div>
      </form></div></section>
    <script>
      const form = document.getElementById('audit-step-3');
      const summaryText = document.getElementById('summary-text');
      const submitButton = form.querySelector('button[type="submit"]');
      const params = new URLSearchParams(window.location.search);
      const auditId = params.get('id');
      if (!auditId) window.location.href = './';
      form.querySelector('.form-secondary--link').href = `step-2.html?id=${encodeURIComponent(auditId)}`;

      async function loadSummary() {
        const response = await fetch(`/api/audit/get?id=${encodeURIComponent(auditId)}`);
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Failed to load summary');
        summaryText.textContent = result.audit.generated_summary || 'We could not generate a summary yet.';
      }

      loadSummary().catch((error) => {
        summaryText.textContent = error.message || 'Something went wrong loading the summary.';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!form.reportValidity()) return;
        submitButton.disabled = true;
        submitButton.textContent = 'Sending...';
        try {
          const payload = Object.fromEntries(new FormData(form).entries());
          payload.id = auditId;
          const response = await fetch('/api/audit/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || 'Failed to submit audit');
          submitButton.textContent = 'Audit requested';
          form.classList.add('is-submitted');
        } catch (error) {
          submitButton.disabled = false;
          submitButton.textContent = 'Request your audit';
          alert(error.message || 'Something went wrong submitting the audit.');
        }
      });
    </script>
  </body>
</html>
